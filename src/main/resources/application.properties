spring.application.name=avaliacao
#informa o banco - esta rodando na 3306 - usando db_avaliacao
spring.datasource.url=jdbc:mysql://localhost:3306/db_avaliacao
spring.datasource.username=root
spring.datasource.password=

#permite o hibernate a fazer alteracoes no banco a partir das entidades
spring.jpa.hibernate.ddl-auto=update
#exibe os comandos SQL no console
spring.jpa.show-sql=true
#traduz o JPQL para o dialeto do MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#padrao: porta 8080
#definir a porta do projeto como 8081
server.port=8081